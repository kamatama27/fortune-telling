    desc: "おおきな もくひょうに むかって まっすぐ すすむ カッコいいリーダー！いつも 「もっとよくなるには？」と かんがえて、みんなを ひっぱっていくよ！" },

// ===== 状態管理 =====
let currentQ = 0;
let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
let answers = []; // 回答を記録（もどる機能用）
let shuffledQuestions = [];

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== 画面制御 =====
function startQuiz() {
  currentQ = 0;
  scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  answers = [];
  shuffledQuestions = shuffleArray(questions);
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("quiz-screen").style.display = "block";
  document.getElementById("result-screen").style.display = "none";
  showQuestion();
  gtag('event', 'quiz_start', { event_category: 'quiz' });
}

function showQuestion() {
  const q = shuffledQuestions[currentQ];
  const total = shuffledQuestions.length;
  const pct = Math.round((currentQ / total) * 100);

  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = `\u2B50 ${currentQ + 1} / ${total} もんめ \u2B50`;

  const card = document.getElementById("question-card");
  card.innerHTML = `
    <span class="question-num">Q${currentQ + 1}</span>
    <h2>${q.text}</h2>
    <div class="options">
      <button class="option-btn" onclick="answer('a')"><span class="option-label">A</span>${q.a}</button>
      <button class="option-btn opt-b" onclick="answer('b')"><span class="option-label">B</span>${q.b}</button>
    </div>
  `;
  // Re-trigger animation
  card.style.animation = "none";
  card.offsetHeight;
  card.style.animation = "";

  // もどるボタン
  const nav = document.getElementById("nav-buttons");
  if (currentQ > 0) {
    nav.innerHTML = `<button class="back-btn" onclick="goBack()"> まえの もんだいに もどる</button>`;
  } else {
    nav.innerHTML = '';
  }
}

function answer(choice) {
  const q = shuffledQuestions[currentQ];
  const dim = q.dim;
  if (choice === "a") {
    scores[dim[0]]++;
  } else {
    scores[dim[1]]++;
  }
  answers[currentQ] = choice;

  gtag('event', 'question_answer', {
    event_category: 'quiz',
    question_number: currentQ + 1,
    dimension: dim,
    choice: choice
  });

  currentQ++;
  if (currentQ < shuffledQuestions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (currentQ <= 0) return;
  gtag('event', 'question_back', {
    event_category: 'quiz',
    question_number: currentQ + 1
  });
  currentQ--;
  // 前の回答のスコアを取り消す
  const q = shuffledQuestions[currentQ];
  const dim = q.dim;
  const prevChoice = answers[currentQ];
  if (prevChoice === "a") {
    scores[dim[0]]--;
  } else {
    scores[dim[1]]--;
  }
  answers[currentQ] = undefined;
  showQuestion();
}

function showResult() {
  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("result-screen").style.display = "block";

  const ei = scores.E >= scores.I ? "E" : "I";
  const sn = scores.S >= scores.N ? "S" : "N";
  const tf = scores.T >= scores.F ? "T" : "F";
  const jp = scores.J >= scores.P ? "J" : "P";
  const type = ei + sn + tf + jp;
  const info = typeData[type];

  gtag('event', 'quiz_complete', {
    event_category: 'quiz',
    mbti_type: type,
    mbti_name: info.name
  });

  const dims = [
    { left: "E（がいこうがた）", right: "I（ないこうがた）", lv: scores.E, rv: scores.I },
    { left: "S（かんかくがた）", right: "N（ちょっかんがた）", lv: scores.S, rv: scores.N },
    { left: "T（しこうがた）", right: "F（かんじょうがた）", lv: scores.T, rv: scores.F },
    { left: "J（はんだんがた）", right: "P（ちかくがた）", lv: scores.J, rv: scores.P },
  ];

  let dimHTML = dims.map(d => {
    const total = d.lv + d.rv;
    const leftPct = total > 0 ? Math.round((d.lv / total) * 100) : 50;
    const rightPct = 100 - leftPct;
    const leftActive = d.lv >= d.rv;
    return `
      <div class="dim-row">
        <div class="dim-labels">
          <span class="${leftActive ? 'active-dim' : ''}">${d.left} ${leftPct}%</span>
          <span class="${!leftActive ? 'active-dim' : ''}">${rightPct}% ${d.right}</span>
        </div>
        <div class="dim-bar">
          <div class="dim-fill ${leftActive ? 'dim-fill-left' : 'dim-fill-right'}"
               style="width: ${leftActive ? leftPct : rightPct}%; ${!leftActive ? 'float:right' : ''}"></div>
        </div>
      </div>`;
  }).join("");

  let traitsHTML = info.traits.map(t => `<span class="trait-tag">${t}</span>`).join("");

  const charaHTML = `<img src="tipe_chara/yumeirobear_${type.toLowerCase()}.png" alt="${info.name}" class="result-chara">`;

  document.getElementById("result-card").innerHTML = `
    ${charaHTML}
    <div class="type-label">${type}</div>
    <div class="type-name">きみは「${info.name}」タイプ！</div>
    <div class="traits">${traitsHTML}</div>
    <div class="type-desc">${info.desc}</div>
    <div class="dimension-bars">${dimHTML}</div>
    <button class="btn-secondary" onclick="retry()">\uD83D\uDD04 もういちど やってみる！</button>
  `;
}

function retry() {
  gtag('event', 'quiz_retry', { event_category: 'quiz' });
  document.getElementById("result-screen").style.display = "none";
  document.getElementById("start-screen").style.display = "block";
}

function goHome() {
  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("result-screen").style.display = "none";
  document.getElementById("start-screen").style.display = "block";
}
</script>
